# Single-service stack: one container serves the API + static frontend, with the
# SQLite database stored on a named volume so data survives container rebuilds.
# Open http://localhost:4000 after `docker compose up --build`.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mammut_vip
    env_file: .env
    environment:
      # Override so the DB always points at the mounted volume inside the container.
      DATABASE_URL: file:/app/data/app.db
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    volumes:
      - app_data:/app/data
    restart: unless-stopped

volumes:
  app_data:
